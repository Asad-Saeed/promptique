name = "promptique-proxy"
main = "worker.js"
compatibility_date = "2026-04-01"

# Public vars; override in the dashboard. Use "*" only for dev.
[vars]
ALLOWED_ORIGINS = "*"
LOGGING = "on"

# Per-IP rate limit: 10 req / 60s.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Secret GEMINI_API_KEY is set via `wrangler secret put`.
