name = "promptique-proxy"
main = "worker.js"
compatibility_date = "2026-04-01"

# Public config. Override in the Cloudflare dashboard or with `wrangler deploy --var`.
# ALLOWED_ORIGINS: comma-separated list, or "*" to allow any origin (dev only).
#   Example (prod): "chrome-extension://abcdefghijklmnopabcdefghijklmnop,https://<user>.github.io"
# LOGGING: "on" (default) or "off" — toggles the structured console.log lines.
[vars]
ALLOWED_ORIGINS = "*"
LOGGING = "on"

# Per-IP rate limit: 10 requests per 60 seconds.
# The native ratelimit binding supports period = 10 | 60 only.
# For a per-day cap, layer KV or Durable Objects on top (not included in v1).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Secrets (NOT committed — set via `wrangler secret put`):
#   GEMINI_API_KEY  — your Gemini API key from https://aistudio.google.com/apikey
